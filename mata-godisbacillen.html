  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff9f0;
      overflow: hidden;
      touch-action: none;
      font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
    }
    canvas { display: block; }

    /* ── Reaktionsvideo-overlay ── */
    #video-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 10;
      background: rgba(255,255,255,0.96);
      justify-content: center;
      align-items: center;
    }
    #video-overlay.active { display: flex; }
    #reaction-video {
      max-width: 92%; max-height: 92%;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    /* ── Startskärm ── */
    #start-screen {
      position: fixed; inset: 0; z-index: 20;
      background: linear-gradient(160deg, #fff8e1 0%, #fce4ec 50%, #e8f5e9 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      cursor: pointer; overflow: hidden;
      user-select: none;
    }

    /* Fallande godis i bakgrunden */
    .bg-candy {
      position: absolute; top: -80px;
      font-size: 48px;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes fall {
      from { transform: translateY(0) rotate(0deg); opacity: 1; }
      to   { transform: translateY(110vh) rotate(360deg); opacity: 0.6; }
    }

    /* Godisbacillen på startskärmen */
    #start-bug {
      width: min(42vw, 220px);
      pointer-events: none;
      mix-blend-mode: multiply;
      animation: bounce 1.6s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    .start-title {
      font-size: clamp(28px, 7vw, 52px);
      font-weight: 900;
      color: #fff;
      position: relative; z-index: 1;
      text-shadow:
        3px 3px 0 #e91e63,
        -1px -1px 0 #e91e63,
        1px -1px 0 #e91e63,
        -1px 1px 0 #e91e63;
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.15;
      margin: 12px 20px 6px;
    }

    .start-sub {
      font-size: clamp(16px, 3.5vw, 24px);
      color: #5d4037;
      margin-bottom: 24px;
      text-align: center;
      position: relative; z-index: 1;
    }

    .start-btn {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: #222;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: clamp(20px, 4.5vw, 32px);
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 #2e7d32, 0 8px 20px rgba(0,0,0,0.2);
      cursor: pointer;
      animation: pulse 1.2s ease-in-out infinite;
      border: 3px solid rgba(255,255,255,0.4);
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);    box-shadow: 0 6px 0 #2e7d32, 0 8px 20px rgba(0,0,0,0.2); }
      50%      { transform: scale(1.06); box-shadow: 0 4px 0 #2e7d32, 0 6px 24px rgba(0,0,0,0.25); }
    }
  </style>
