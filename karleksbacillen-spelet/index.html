<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; }
#game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; display: block; }
#ui {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  pointer-events: none; padding: 10px 80px 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#top-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; }
#brand { font-family: 'Fredoka', sans-serif; font-size: 17px; color: #ffb3d1; }
#level-text { font-size: 13px; color: #ff80b4; font-weight: 700; }
#hearts-display { font-size: 20px; letter-spacing: 3px; }
#msg {
  font-size: 14px; font-weight: 900; color: #ff80b4;
  text-shadow: 0 1px 8px rgba(255,80,160,0.5);
}
#video-overlay {
  position: fixed; left: 0; right: 0; bottom: 0; height: 54%;
  display: none; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
  background: linear-gradient(to bottom, rgba(255,180,210,0) 0%, rgba(245,168,188,0.97) 16%);
  z-index: 10; padding: 10px 14px 14px;
}
#love-video { width: min(88%, 400px); border-radius: 14px; object-fit: contain; max-height: 88%; }
#video-label {
  font-family: 'Fredoka', sans-serif; font-size: 15px; color: #ff4488;
  letter-spacing: 1px; text-shadow: 0 0 14px rgba(255,100,168,0.6);
}

<body>
<canvas id="game-canvas"></canvas>
<div id="ui">
  <div id="top-bar">
    <div id="brand">💖 Bacillerna</div>
    <div id="level-text">Nivå 1</div>
  </div>
  <div id="hearts-display">🤍🤍🤍</div>
  <div id="msg">Dra en kärlekslinje till varje ensam figur!</div>
</div>
<div id="video-overlay">
  <video id="love-video" playsinline webkit-playsinline src="karleksvagen.mp4"></video>
  <div id="video-label">💖 Kärleksvågen!</div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const videoOverlay = document.getElementById('video-overlay');
const loveVideo = document.getElementById('love-video');

const TARGET_SETS = [
  [{sad:'👧',happy:'🥰'},{sad:'🐶',happy:'🐕'},{sad:'👦🏾',happy:'😄'}],
  [{sad:'👧🏿',happy:'🥰'},{sad:'🐱',happy:'😸'},{sad:'👴🏻',happy:'😊'},{sad:'🐰',happy:'🐇'},{sad:'🦊',happy:'😊'},{sad:'🐸',happy:'😄'}],
  [{sad:'👧🏽',happy:'🥰'},{sad:'👦🏻',happy:'😄'},{sad:'🐶',happy:'🐕'},{sad:'👵🏿',happy:'😊'},{sad:'🐱',happy:'😸'},{sad:'🦋',happy:'🌸'},{sad:'🐨',happy:'😊'},{sad:'🦄',happy:'🌈'}]
];

let state='playing', dragging=false, dragStart=null, dragCurrent=null;
let connectedTargets=new Set(), totalTargets=0, level=1;
let particles=[], figureHearts=[], chains=[], targets=[];
let figureReact=false, animating=false, bug={};

const bugImg = new Image();
bugImg.src = 'karleksbacillen.jpg';

const TOP_PAD = 100; // utrymme för UI-overlay längst upp

const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function playPling(i=0){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  // Lite högre ton för varje ny figur som kopplas
  osc.frequency.setValueAtTime(660 + i*110, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880 + i*110, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.35);
}

function cW(){ return window.innerWidth; }
function cH(){ return window.innerHeight; }
function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
}

let _resizeTimer;
function onResize(){
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(resize, 200);
}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.changedTouches?.[0]??e.touches?.[0]??e;
  return {x:t.clientX-rect.left, y:t.clientY-rect.top};
}

function initLevel(){
  const w=cW(), h=cH();
  connectedTargets=new Set(); chains=[]; particles=[]; figureHearts=[]; figureReact=false;
  const idx=Math.min(level-1,2), set=TARGET_SETS[idx];
  totalTargets=set.length;
  bug={x:w/2, y:h*0.76, r:46, pulse:0};
  const playH = h - TOP_PAD; // spelyta under UI
  const posMap=[
    [{x:.22,y:.10},{x:.78,y:.10},{x:.50,y:.27}],
    [{x:.17,y:.08},{x:.83,y:.08},{x:.30,y:.25},{x:.70,y:.25},{x:.15,y:.44},{x:.85,y:.44}],
    [{x:.12,y:.07},{x:.50,y:.06},{x:.88,y:.07},{x:.22,y:.24},{x:.78,y:.24},{x:.12,y:.43},{x:.88,y:.43},{x:.50,y:.56}]
  ];
  targets=posMap[idx].map((p,i)=>({
    x:p.x*w, y:TOP_PAD + p.y*playH, r:28,
    sad:set[i].sad, happy:set[i].happy,
    connected:false, bounce:0
  }));
  updateUI(); state='playing';
  if(!animating){animating=true; loop();}
}

function updateUI(){
  const n=connectedTargets.size;
  document.getElementById('hearts-display').textContent=
    Array.from({length:totalTargets},(_,i)=>i<n?'💖':'🤍').join('');
  document.getElementById('level-text').textContent='Nivå '+level;
}

loveVideo.addEventListener('ended',()=>{
  videoOverlay.style.display='none';
  figureReact=false; figureHearts=[];
  setTimeout(nextLevel,500);
});

function triggerWave(){
  state='wave'; figureReact=true;
  document.getElementById('msg').textContent='💖 Kärleksvågen!';
  targets.forEach(t=>{
    for(let i=0;i<7;i++){
      const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.9, sp=2+Math.random()*3.5;
      figureHearts.push({
        x:t.x,y:t.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
        life:1,decay:.012+Math.random()*.01,size:12+Math.random()*14,
        rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.12,
        color:['#ff4488','#ff80b4','#ffb3d1','#ff2266','#ffaacc'][Math.floor(Math.random()*5)]
      });
    }
  });
  videoOverlay.style.display='flex';
  loveVideo.currentTime=0;
  loveVideo.play().catch(()=>{
    setTimeout(()=>{
      videoOverlay.style.display='none';
      figureReact=false; figureHearts=[];
      setTimeout(nextLevel,500);
    },1500);
  });
}

function drawHeart(x,y,size,color,alpha,rot){
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(x,y); ctx.rotate(rot);
  const s=size/2;
  ctx.beginPath(); ctx.moveTo(0,s*.4);
  ctx.bezierCurveTo(-s*1.1,-s*.3,-s*1.1,-s*1.1,0,-s*.5);
  ctx.bezierCurveTo(s*1.1,-s*1.1,s*1.1,-s*.3,0,s*.4);
  ctx.fillStyle=color; ctx.fill(); ctx.restore();
}

function drawBug(){
  const {x,y,r,pulse}=bug;
  const sc=1+Math.sin(pulse)*.03;
  // Glow
  if(connectedTargets.size>0||state==='wave'){
    ctx.save();
    const grd=ctx.createRadialGradient(x,y,r*.8,x,y,r*2);
    grd.addColorStop(0,'rgba(255,80,150,0.3)'); grd.addColorStop(1,'rgba(255,80,150,0)');
    ctx.beginPath(); ctx.arc(x,y,r*2,0,Math.PI*2);
    ctx.fillStyle=grd; ctx.fill(); ctx.restore();
  }
  // Image clipped to circle
  const size=r*2.8*sc;
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y-r*.05,r*1.4,0,Math.PI*2); ctx.clip();
  if(bugImg.complete&&bugImg.naturalWidth>0){
    const aspect=bugImg.naturalWidth/bugImg.naturalHeight;
    let dw=size, dh=size/aspect;
    if(dh<size){dh=size; dw=size*aspect;}
    ctx.drawImage(bugImg,x-dw/2,y-r*.05-dh/2,dw,dh);
  } else {
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='#e8548a'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`${r*.6}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💖',x,y);
  }
  ctx.restore();
  // Hint text
  if(connectedTargets.size===0&&state==='playing'){
    ctx.save(); ctx.globalAlpha=0.5+Math.sin(pulse*2)*.3;
    ctx.fillStyle='#ffb3d1'; ctx.font='12px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.fillText('tryck & dra',x,y+r*1.75); ctx.restore();
  }
}

function drawTarget(t){
  const bounce=t.connected?Math.sin(t.bounce)*4:0;
  ctx.save(); ctx.translate(t.x,t.y+bounce);
  if(t.connected){
    const g=ctx.createRadialGradient(0,0,t.r*.5,0,0,t.r+12);
    g.addColorStop(0,'rgba(255,150,180,0.4)'); g.addColorStop(1,'rgba(255,150,180,0)');
    ctx.beginPath(); ctx.arc(0,0,t.r+12,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(0,0,t.r,0,Math.PI*2);
  ctx.fillStyle=t.connected?'rgba(255,220,235,0.95)':'rgba(230,160,185,0.4)'; ctx.fill();
  ctx.strokeStyle=t.connected?'#ff6fa8':'#e88aaa'; ctx.lineWidth=2; ctx.stroke();
  ctx.font=`${t.r*1.15}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t.connected?t.happy:t.sad,0,2); ctx.restore();
}

function drawChain(c){
  if(c.points.length<2) return;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(c.points[0].x,c.points[0].y);
  c.points.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='rgba(255,100,168,0.18)'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c.points[0].x,c.points[0].y);
  c.points.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='rgba(255,80,150,0.8)'; ctx.lineWidth=2.5; ctx.stroke();
  c.points.forEach((p,i)=>{
    if(i%5===0){ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle='rgba(255,160,200,0.8)';ctx.fill();}
  }); ctx.restore();
}

function spawnParticles(x,y){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
      decay:.025+Math.random()*.02,size:3+Math.random()*5,
      color:['#ff6fa8','#ff4488','#ffb3d1','#ff2266'][Math.floor(Math.random()*4)]});
  }
}

function buildPath(from,to){
  const pts=[],steps=28;
  const cx=(from.x+to.x)/2+(Math.random()-.5)*60;
  const cy=(from.y+to.y)/2-60-Math.random()*30;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    pts.push({
      x:(1-t)*(1-t)*from.x+2*(1-t)*t*cx+t*t*to.x,
      y:(1-t)*(1-t)*from.y+2*(1-t)*t*cy+t*t*to.y
    });
  }
  return pts;
}

function loop(){
  const w=cW(),h=cH();
  ctx.clearRect(0,0,w,h);
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#f9c6d0'); bg.addColorStop(1,'#f5a8bc');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
  [[.1,.06,70],[.9,.09,55],[.2,.48,40],[.8,.42,60],[.5,.65,45],[.3,.86,35]].forEach(([cx,cy,cr],i)=>{
    ctx.save(); ctx.globalAlpha=0.04+i*.007; ctx.fillStyle='#ff4488';
    ctx.beginPath(); ctx.arc(cx*w,cy*h,cr,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
  if(state==='wave'){
    ctx.save(); ctx.strokeStyle='rgba(255,80,150,0.12)'; ctx.lineWidth=1; ctx.setLineDash([6,6]);
    ctx.beginPath(); ctx.moveTo(16,h*.47); ctx.lineTo(w-16,h*.47); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  chains.forEach(drawChain);
  targets.forEach(t=>{if(t.connected)t.bounce+=.13; drawTarget(t);});
  if(figureReact){
    if(Math.random()<.04){
      targets.forEach(t=>{
        const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.8,sp=1.5+Math.random()*2.5;
        figureHearts.push({x:t.x,y:t.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.5,
          life:1,decay:.016+Math.random()*.01,size:9+Math.random()*10,
          rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.1,
          color:['#ff4488','#ff80b4','#ffb3d1'][Math.floor(Math.random()*3)]});
      });
    }
    figureHearts=figureHearts.filter(h=>h.life>0);
    figureHearts.forEach(h=>{
      drawHeart(h.x,h.y,h.size,h.color,h.life*.9,h.rot);
      h.x+=h.vx; h.y+=h.vy; h.vy+=.04; h.rot+=h.rotV; h.life-=h.decay;
    });
  }
  if(dragging&&dragStart&&dragCurrent){
    ctx.save(); ctx.setLineDash([8,5]);
    ctx.beginPath(); ctx.moveTo(dragStart.x,dragStart.y); ctx.lineTo(dragCurrent.x,dragCurrent.y);
    ctx.strokeStyle='rgba(255,100,168,0.8)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  bug.pulse+=.06;
  if(state!=='wave') drawBug();
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.life-=p.decay;
  });
  requestAnimationFrame(loop);
}

function onDown(e){
  e.preventDefault(); if(state!=='playing') return;
  const pos=getPos(e);
  if(dist(pos,bug)<=bug.r*1.65){dragging=true;dragStart={x:bug.x,y:bug.y};dragCurrent={...pos};}
}
function onMove(e){e.preventDefault();if(!dragging)return;dragCurrent=getPos(e);}
function onUp(e){
  e.preventDefault(); if(!dragging)return; dragging=false;
  const pos=getPos(e);
  let hit=null;
  for(const t of targets){if(!t.connected&&dist(pos,{x:t.x,y:t.y})<=t.r+16){hit=t;break;}}
  if(hit){
    hit.connected=true; connectedTargets.add(targets.indexOf(hit));
    chains.push({points:buildPath(bug,hit)});
    spawnParticles(hit.x,hit.y);
    playPling(connectedTargets.size - 1);
    updateUI();
    if(connectedTargets.size===totalTargets){
      document.getElementById('msg').textContent='💖 Alla fick kärlek!';
      setTimeout(triggerWave,350);
    } else {
      document.getElementById('msg').textContent='💖 Fortsätt!';
    }
  }
  dragStart=null; dragCurrent=null;
}

function nextLevel(){
  if(level>=3)level=1; else level++;
  initLevel(); state='playing';
  document.getElementById('msg').textContent='Dra en kärlekslinje till varje ensam figur!';
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',onResize);
} else {
  window.addEventListener('resize',onResize);
}
resize();
initLevel();
</script>
</body>
