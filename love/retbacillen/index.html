<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retbacillen · Skicka en hälsning</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --coral: #FFD93D;
    --coral-dark: #E5C200;
    --coral-soft: #FFF8D6;
    --ink: #2D2D2D;
    --ink-soft: #6B6B6B;
    --bg: #FFF8F8;
    --white: #FFFFFF;
    --border: #F0E8E8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .page { min-height: 100vh; padding: 24px 20px 60px; display: flex; flex-direction: column; align-items: center; }
  .back-link { align-self: flex-start; max-width: 520px; width: 100%; margin: 0 auto 20px; font-size: 14px; color: var(--ink-soft); text-decoration: none; font-weight: 600; }
  .back-link:hover { color: var(--coral); }
  .container { max-width: 520px; width: 100%; }
  .header { text-align: center; margin-bottom: 32px; }
  .emoji { font-size: 56px; margin-bottom: 8px; }
  .emoji img { width: 120px; height: 120px; object-fit: contain; }
  h1 { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 28px; color: var(--coral); margin-bottom: 8px; }
  .header-sub { color: var(--ink-soft); font-size: 15px; }
  .step-label { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 13px; color: var(--ink-soft); letter-spacing: 2px; margin: 28px 0 14px; text-align: center; }
  .messages { display: flex; flex-direction: column; gap: 12px; }
  .message-card { background: var(--white); border: 2px solid var(--border); border-radius: 16px; padding: 18px; cursor: pointer; transition: border-color 0.2s, background 0.2s; display: flex; align-items: flex-start; gap: 14px; }
  .message-card:hover { border-color: var(--coral); }
  .message-card.selected { border-color: var(--coral); background: var(--coral-soft); }
  .message-radio { width: 22px; height: 22px; border: 2px solid #D0D0D0; border-radius: 50%; flex-shrink: 0; margin-top: 2px; position: relative; transition: border-color 0.2s; }
  .message-card.selected .message-radio { border-color: var(--coral); }
  .message-card.selected .message-radio::after { content: ''; position: absolute; top: 4px; left: 4px; width: 10px; height: 10px; background: var(--coral); border-radius: 50%; }
  .message-content { flex: 1; }
  .message-title { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 17px; color: var(--ink); margin-bottom: 4px; }
  .message-preview { font-size: 14px; color: var(--ink-soft); line-height: 1.4; }
  .preview-button { display: inline-block; margin-top: 8px; color: var(--coral); font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; background: none; border: none; padding: 0; }
  .preview-button:hover { text-decoration: underline; }
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal.visible { display: flex; }
  .modal-content { width: 100%; max-width: 380px; aspect-ratio: 9/16; background: black; border-radius: 20px; overflow: hidden; position: relative; }
  .modal-content video { width: 100%; height: 100%; object-fit: cover; }
  .modal-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 8px; }
  .form-section { background: var(--white); border-radius: 20px; padding: 24px; margin-top: 20px; display: none; }
  .form-section.visible { display: block; }
  label { display: block; font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 8px; }
  .label-hint { font-weight: 400; color: var(--ink-soft); font-size: 13px; }
  input[type="text"] { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 16px; color: var(--ink); background: var(--white); transition: border-color 0.2s; margin-bottom: 18px; }
  input[type="text"]:focus { outline: none; border-color: var(--coral); }
  button.primary { background: var(--coral); color: var(--white); border: none; padding: 16px 24px; border-radius: 12px; font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 17px; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; }
  button.primary:hover { background: var(--coral-dark); }
  button.primary:active { transform: scale(0.98); }
  .result { display: none; background: var(--white); padding: 24px; border-radius: 20px; margin-top: 20px; }
  .result.visible { display: block; }
  .result-title { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 22px; margin-bottom: 14px; text-align: center; }
  .link-box { background: var(--coral-soft); padding: 12px 14px; border-radius: 10px; font-size: 12px; word-break: break-all; margin-bottom: 18px; }
  .share-buttons { display: flex; flex-direction: column; gap: 10px; }
  .share-button { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 16px; background: var(--white); border: 2px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 15px; color: var(--ink); text-decoration: none; cursor: pointer; }
  .share-button:hover { border-color: var(--coral); background: var(--coral-soft); }
  .preview-link { display: block; text-align: center; margin-top: 14px; font-size: 14px; color: var(--coral); text-decoration: none; font-weight: 600; }
  .footer { margin-top: 32px; text-align: center; font-size: 12px; color: var(--ink-soft); }
  .footer a { color: var(--ink-soft); text-decoration: none; }
  @media (max-width: 480px) { h1 { font-size: 24px; } .emoji { font-size: 48px; } }
  .site-header { background: white; border-bottom: 1px solid #f0f0f0; padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .site-logo { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 1.5px; color: #2a2a2a; text-decoration: none; }
  .site-nav { display: flex; gap: 22px; font-size: 14px; font-weight: 600; flex-wrap: wrap; position: absolute; left: 50%; transform: translateX(-50%); }
  .site-nav a { text-decoration: none; color: #555555; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; font-family: 'Nunito', sans-serif; }
  .site-nav a:hover { color: #E55A40; }
  .menu-btn { display: none; background: none; border: 2px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
  @media (max-width: 720px) { .site-header { flex-wrap: nowrap; } .site-nav { display: none; position: absolute; top: 100%; left: 0; right: 0; transform: none; background: white; border-bottom: 1px solid #f0f0f0; padding: 16px 24px; flex-direction: column; gap: 12px; z-index: 99; } .site-nav.open { display: flex; } .menu-btn { display: block; } }
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo">BACILLERNA</a>
  <button class="menu-btn" onclick="document.querySelector('.site-nav').classList.toggle('open')">Meny</button>
  <nav class="site-nav">
    <a href="/karaktarer.html">Karaktärer</a>
    <a href="/sagor.html">Sagor</a>
    <a href="/bocker.html">Böcker</a>
    <a href="/spel.html">Spel</a>
    <a href="/titta.html">Titta</a>
    <a href="/foraldrar.html">Föräldrar</a>
  </nav>
</header>

<div class="page">
  <a href="../" class="back-link">← Tillbaka till alla baciller</a>
  <div class="container">
    <div class="header">
      <div class="emoji"><img src="../images/retbacillen-portrait.png" alt="Retbacillen"></div>
      <h1>Retbacillen</h1>
      <div class="header-sub">Välj vilken hälsning du vill skicka</div>
    </div>
    <div class="step-label">VÄLJ MEDDELANDE</div>
    <div class="messages" id="messages-list"></div>
    <form class="form-section" id="form-section" onsubmit="event.preventDefault(); createLink();">
      <div class="step-label" style="margin-top: 0;">FYLL I NAMN</div>
      <label for="till">Vem ska få hälsningen?</label>
      <input type="text" id="till" name="till" placeholder="Förnamn" maxlength="25" required>
      <label for="fran">Vad heter du? <span class="label-hint">(valfritt)</span></label>
      <input type="text" id="fran" name="fran" placeholder="Ditt förnamn" maxlength="25">
      <button type="submit" class="primary">Skapa länk</button>
    </form>
    <div id="result" class="result">
      <div class="result-title">Din länk är klar 😝</div>
      <div class="link-box" id="link-display"></div>
      <div class="share-buttons">
        <a href="#" class="share-button" id="share-sms"><span>📱</span><span>Skicka via SMS</span></a>
        <a href="#" class="share-button" id="share-whatsapp" target="_blank" rel="noopener"><span>💬</span><span>Skicka via WhatsApp</span></a>
        <a href="#" class="share-button" id="share-email"><span>📧</span><span>Skicka via mejl</span></a>
        <button class="share-button" id="share-copy" type="button"><span>📋</span><span id="copy-label">Kopiera länken</span></button>
      </div>
      <a href="#" class="preview-link" id="preview-link" target="_blank" rel="noopener">Se hur hälsningen ser ut →</a>
    </div>
    <div class="footer">Bacillerna · <a href="/">bacillerna.se</a></div>
  </div>
</div>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <video id="modal-video" controls playsinline></video>
  </div>
</div>

<script>
  let selectedMessage = null;
  let bacillData = null;

  fetch('../data/messages.json')
    .then(r => r.json())
    .then(data => { bacillData = data.baciller.ret; renderMessages(); })
    .catch(err => console.error('Kunde inte ladda meddelanden:', err));

  function renderMessages() {
    const list = document.getElementById('messages-list');
    bacillData.meddelanden.filter(m => m.aktiv).forEach(msg => {
      const card = document.createElement('div');
      card.className = 'message-card';
      card.dataset.id = msg.id;
      card.onclick = () => selectMessage(msg.id);
      card.innerHTML = '<div class="message-radio"></div><div class="message-content"><div class="message-title">' + msg.titel_sv + '</div><div class="message-preview">' + msg.forhandsvisning_sv + '</div><button class="preview-button" onclick="event.stopPropagation(); previewVideo(\'' + msg.video_sv + '\')">▶ Förhandsvisa video</button></div>';
      list.appendChild(card);
    });
  }

  function selectMessage(id) {
    selectedMessage = id;
    document.querySelectorAll('.message-card').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.id) === id));
    document.getElementById('form-section').classList.add('visible');
    document.getElementById('result').classList.remove('visible');
    setTimeout(() => document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }

  function previewVideo(filename) {
    const video = document.getElementById('modal-video');
    video.src = '../videos/' + filename;
    document.getElementById('modal').classList.add('visible');
    video.play().catch(() => {});
  }

  function closeModal(event) {
    if (event && event.target.id !== 'modal') return;
    const video = document.getElementById('modal-video');
    video.pause(); video.src = '';
    document.getElementById('modal').classList.remove('visible');
  }

  function createLink() {
    if (!selectedMessage) return;
    const till = document.getElementById('till').value.trim();
    const fran = document.getElementById('fran').value.trim();
    if (!till) return;
    const params = new URLSearchParams();
    params.set('bacill', 'ret');
    params.set('v', selectedMessage);
    params.set('till', till);
    if (fran) params.set('fran', fran);
    const base = window.location.origin + '/love/k/';
    const fullLink = base + '?' + params.toString();
    document.getElementById('link-display').textContent = fullLink;
    document.getElementById('preview-link').href = fullLink;
    const smsText = till + ' 😝 du har fått en hemlig hälsning från mig: ' + fullLink;
    const emailSubject = 'En hälsning till dig 😝';
    const emailBody = 'Hej ' + till + '!\n\nJag har skickat en hemlig busig hälsning till dig:\n' + fullLink + '\n\n' + (fran ? '— ' + fran : '');
    document.getElementById('share-sms').href = 'sms:?body=' + encodeURIComponent(smsText);
    document.getElementById('share-whatsapp').href = 'https://wa.me/?text=' + encodeURIComponent(smsText);
    document.getElementById('share-email').href = 'mailto:?subject=' + encodeURIComponent(emailSubject) + '&body=' + encodeURIComponent(emailBody);
    document.getElementById('share-copy').onclick = function() {
      navigator.clipboard.writeText(fullLink).then(function() {
        document.getElementById('copy-label').textContent = 'Kopierat ✓';
        setTimeout(function() { document.getElementById('copy-label').textContent = 'Kopiera länken'; }, 2000);
      });
    };
    document.getElementById('result').classList.add('visible');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
