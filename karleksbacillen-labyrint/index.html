<script>
const canvas = document.getElementById('maze');
const ctx = canvas.getContext('2d');

const bugImg = new Image();
bugImg.src = 'karleksbacillen.png';

let COLS = 8, ROWS = 9, SEED = 42;
let grid = [], playerR = 0, playerC = 0;
let goalR, goalC;
let cellW, cellH, offX, offY;
let bugAnim = 0, heartAnim = 0, won = false;
let animFrame;

let rngState;
function rand() {
  rngState = (rngState * 16807) % 2147483647;
  return rngState / 2147483647;
}

let EXTRA_RATIO = 0.0;

function buildMaze(cols, rows, seed) {
  rngState = seed;
  const g = [];
  for(let r = 0; r < rows; r++){
    g[r] = [];
    for(let c = 0; c < cols; c++) g[r][c] = {visited:false, walls:[true,true,true,true]};
  }
  function carve(r, c){
    g[r][c].visited = true;
    const dirs = [[0,1,1,3],[1,0,2,0],[-1,0,0,2],[0,-1,3,1]];
    dirs.sort(()=>rand()-0.5);
    for(const [dr,dc,w1,w2] of dirs){
      const nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!g[nr][nc].visited){
        g[r][c].walls[w1]=false;
        g[nr][nc].walls[w2]=false;
        carve(nr,nc);
      }
    }
  }
  carve(0,0);
  if(EXTRA_RATIO > 0){
    const extraCount = Math.floor(cols * rows * EXTRA_RATIO);
    for(let i = 0; i < extraCount; i++){
      const r=Math.floor(rand()*rows), c=Math.floor(rand()*cols), side=Math.floor(rand()*4);
      if(side===0&&r>0)      { g[r][c].walls[0]=false; g[r-1][c].walls[2]=false; }
      else if(side===1&&c<cols-1){ g[r][c].walls[1]=false; g[r][c+1].walls[3]=false; }
      else if(side===2&&r<rows-1){ g[r][c].walls[2]=false; g[r+1][c].walls[0]=false; }
      else if(side===3&&c>0) { g[r][c].walls[3]=false; g[r][c-1].walls[1]=false; }
    }
  }
  return g;
}

function findHardestGoal(g, startR, startC, cols, rows, topPercent) {
  const dist = Array.from({length:rows},()=>Array(cols).fill(-1));
  const queue = [[startR, startC]];
  dist[startR][startC] = 0;
  const moves = [[-1,0,0,2],[0,1,1,3],[1,0,2,0],[0,-1,3,1]];
  while(queue.length){
    const [r,c] = queue.shift();
    for(const [dr,dc,w] of moves){
      const nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&dist[nr][nc]===-1&&!g[r][c].walls[w]){
        dist[nr][nc]=dist[r][c]+1;
        queue.push([nr,nc]);
      }
    }
  }
  const cells = [];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(dist[r][c]>0) cells.push([dist[r][c],r,c]);
  cells.sort((a,b)=>b[0]-a[0]);
  const cutoff = Math.max(1, Math.floor(cells.length * topPercent));
  const candidates = cells.slice(0, cutoff);
  const pick = candidates[Math.floor(Math.random()*candidates.length)];
  return [pick[1], pick[2]];
}

function resize() {
  const headerEl   = document.querySelector('header');
  const diffEl     = document.querySelector('.difficulty-bar');
  const hintEl     = document.querySelector('.controls-hint');
  const dpadEl     = document.querySelector('.dpad');
  const reserved   = headerEl.offsetHeight + diffEl.offsetHeight + hintEl.offsetHeight + dpadEl.offsetHeight + 30;
  const maxW       = Math.min(window.innerWidth - 16, 600);
  const maxH       = window.innerHeight - reserved;
  const ratio      = COLS / ROWS;
  let w = maxW, h = maxW / ratio;
  if(h > maxH) { h = maxH; w = h * ratio; }
  canvas.width  = Math.floor(w);
  canvas.height = Math.floor(h);
  const margin = Math.floor(Math.min(w, h) * 0.04);
  offX  = margin;
  offY  = margin;
  cellW = (canvas.width  - margin*2) / COLS;
  cellH = (canvas.height - margin*2) / ROWS;
}

function drawBug(cx, cy, size, t) {
  const bob = Math.sin(t * 0.05) * 2;
  ctx.save();
  ctx.translate(cx, cy + bob);

  /* Glow-ring */
  const grd = ctx.createRadialGradient(0,0,size*0.2,0,0,size*1.6);
  grd.addColorStop(0,'rgba(255,107,157,0.30)');
  grd.addColorStop(1,'rgba(255,107,157,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0,0,size*1.6,0,Math.PI*2); ctx.fill();

  if(bugImg.complete && bugImg.naturalWidth > 0){
    /* Rita bilden centrerat med lite mer plats uppåt för håret */
    const imgW = size * 2.6;
    const imgH = imgW * (bugImg.naturalHeight / bugImg.naturalWidth);
    ctx.drawImage(bugImg, -imgW/2, -imgH*0.55, imgW, imgH);
  } else {
    /* Fallback: färgad cirkel */
    ctx.fillStyle = '#FF6B9D';
    ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${size}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💖',0,0);
  }
  ctx.restore();
}

function drawHeart(cx, cy, size, t) {
  const pulse = 1 + Math.sin(t*0.04)*0.08;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);

  const grd = ctx.createRadialGradient(0,0,size*0.2,0,0,size*2);
  grd.addColorStop(0,'rgba(214,58,117,0.3)');
  grd.addColorStop(1,'rgba(214,58,117,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0,0,size*2,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = 'rgba(255,220,235,0.8)';
  ctx.strokeStyle = '#FF6B9D';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,size*1.35,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#D63A75';
  ctx.beginPath();
  ctx.moveTo(0,-size*0.25);
  ctx.bezierCurveTo(size*0.5,-size*0.9,size*1.1,-size*0.2,size*0.45,size*0.4);
  ctx.bezierCurveTo(size*0.2,size*0.65,0,size*0.75,0,size*0.75);
  ctx.bezierCurveTo(0,size*0.75,-size*0.2,size*0.65,-size*0.45,size*0.4);
  ctx.bezierCurveTo(-size*1.1,-size*0.2,-size*0.5,-size*0.9,0,-size*0.25);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.ellipse(-size*0.2,-size*0.15,size*0.18,size*0.1,-0.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#FFD93D';
  const sp = [[-size*1.2,-size*0.8],[size*1.0,-size*1.0],[size*1.3,size*0.2],[-size*0.9,size*0.9]];
  for(const [sx,sy] of sp){
    const ss = size*0.12*(0.7+0.3*Math.sin(t*0.05+sx));
    ctx.save(); ctx.translate(sx,sy);
    for(let i=0;i<4;i++){ ctx.rotate(Math.PI/4); ctx.fillRect(-ss*0.15,-ss,ss*0.3,ss*2); }
    ctx.restore();
  }
  ctx.restore();
}

function drawMaze() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#FFFEF8';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=offX+c*cellW, y=offY+r*cellH;
      ctx.fillStyle = '#fff';
      ctx.fillRect(x,y,cellW,cellH);
    }
  }

  const wt = Math.max(2, Math.min(cellW,cellH)*0.12);
  ctx.strokeStyle = '#FF6B9D';
  ctx.lineWidth = wt;
  ctx.lineCap = 'round';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=offX+c*cellW, y=offY+r*cellH;
      const cell = grid[r][c];
      if(cell.walls[0]){ ctx.beginPath(); ctx.moveTo(x,y);        ctx.lineTo(x+cellW,y);      ctx.stroke(); }
      if(cell.walls[1]){ ctx.beginPath(); ctx.moveTo(x+cellW,y);  ctx.lineTo(x+cellW,y+cellH);ctx.stroke(); }
      if(cell.walls[2]){ ctx.beginPath(); ctx.moveTo(x,y+cellH);  ctx.lineTo(x+cellW,y+cellH);ctx.stroke(); }
      if(cell.walls[3]){ ctx.beginPath(); ctx.moveTo(x,y);        ctx.lineTo(x,y+cellH);      ctx.stroke(); }
    }
  }

  ctx.strokeStyle = '#FF6B9D';
  ctx.lineWidth = wt * 1.5;
  ctx.strokeRect(offX,offY,COLS*cellW,ROWS*cellH);

  const hx = offX+(goalC+0.5)*cellW, hy = offY+(goalR+0.5)*cellH;
  drawHeart(hx, hy, Math.min(cellW,cellH)*0.32, heartAnim);

  const bx = offX+(playerC+0.5)*cellW, by = offY+(playerR+0.5)*cellH;
  drawBug(bx, by, Math.min(cellW,cellH)*0.34, bugAnim);
}

function tryMove(dr, dc) {
  if(won) return;
  const nr=playerR+dr, nc=playerC+dc;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
  const cell = grid[playerR][playerC];
  if(dr===-1&&cell.walls[0]) return;
  if(dc=== 1&&cell.walls[1]) return;
  if(dr=== 1&&cell.walls[2]) return;
  if(dc===-1&&cell.walls[3]) return;
  playerR=nr; playerC=nc;
  if(playerR===goalR&&playerC===goalC) triggerWin();
}

function triggerWin() {
  won = true;
  setTimeout(()=>{
    showLoveWave();
    spawnHearts();
    document.getElementById('win-overlay').classList.add('show');
  }, 400);
}

function showLoveWave() {
  const lw = document.getElementById('love-wave');
  lw.classList.add('show');
  lw.innerHTML = '';
  const cx = offX+(goalC+0.5)*cellW, cy = offY+(goalR+0.5)*cellH;
  ['#FF6B9D','#D63A75','#FFB347','#FF6B9D','#4ECDC4'].forEach((color,i)=>{
    const c = document.createElement('div');
    c.className = 'wave-circle';
    c.style.cssText = `left:${cx}px;top:${cy}px;border-color:${color};animation-delay:${i*0.3}s;`;
    lw.appendChild(c);
  });
}

function spawnHearts() {
  const emojis = ['💖','💕','❤️','💗','💓','💝'];
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const h = document.createElement('div');
      h.className = 'heart-particle';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.cssText = `left:${10+Math.random()*80}%;top:${30+Math.random()*50}%;animation-delay:${Math.random()*0.5}s;font-size:${16+Math.random()*24}px;`;
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 3000);
    }, i*80);
  }
}

function setDifficulty(level, btn) {
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(level==='easy'){
    COLS=8; ROWS=9; SEED=42; EXTRA_RATIO=0.25;
  } else if(level==='medium'){
    COLS=14; ROWS=16; SEED=137; EXTRA_RATIO=0.0;
  } else {
    COLS=20; ROWS=24; SEED=281; EXTRA_RATIO=0.0;
  }
  initGame();
}

function initGame() {
  won = false;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('love-wave').classList.remove('show');
  rngState = SEED;
  grid = buildMaze(COLS, ROWS, SEED);
  playerR = 0; playerC = 0;
  if(EXTRA_RATIO > 0){
    [goalR,goalC] = findHardestGoal(grid,0,0,COLS,ROWS,0.30);
  } else if(COLS<=15){
    [goalR,goalC] = findHardestGoal(grid,0,0,COLS,ROWS,0.05);
  } else {
    [goalR,goalC] = findHardestGoal(grid,0,0,COLS,ROWS,0.01);
  }
  resize();
  cancelAnimationFrame(animFrame);
  loop();
}

function resetGame() { initGame(); }

function loop() {
  bugAnim++;
  heartAnim++;
  drawMaze();
  animFrame = requestAnimationFrame(loop);
}

/* Tangentbord */
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1],
    w:[-1,0], s:[1,0], a:[0,-1], d:[0,1],
    W:[-1,0], S:[1,0], A:[0,-1], D:[0,1]
  };
  if(map[e.key]){ e.preventDefault(); tryMove(...map[e.key]); }
});

/* Svep */
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)) tryMove(0,dx>0?1:-1);
  else tryMove(dy>0?1:-1,0);
},{passive:true});

/* Klick på angränsande cell */
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const cc=Math.floor((mx-offX)/cellW);
  const cr=Math.floor((my-offY)/cellH);
  const dr=cr-playerR, dc=cc-playerC;
  if(Math.abs(dr)+Math.abs(dc)===1) tryMove(dr,dc);
});

/* Fönsterresize */
let _resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{ resize(); }, 150);
});

/* Starta */
bugImg.onload = initGame;
if(bugImg.complete) initGame();
</script>
</body>
</html>
